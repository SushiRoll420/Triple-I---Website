<!DOCTYPE html>
<html>
<head>
    Push
    <title>Landing Page</title>
    <style>
        /* Ulol */
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        /* Top bar */
        .navbar {
            background: black;
            color: white;
            padding: 15px;
        }

        /* Main content now full width */
        .main {
            width: 97.5%;
            padding: 20px;
        }

        h2 {
            color: red;
        }

        .intro {
            display: flex;
            gap: 20px;
        }

        .intro-text {
            width: 60%;
        }

        .intro-box {
            width: 40%;
            height: 150px;
            border: 2px solid red;
        }

        /* Boxes row */
        .row {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .box {
            flex: 1;
            height: 120px;
            border: 2px solid black;
        }

        /* Grid (e-waste) */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .grid-box {
            height: 80px;
            border: 2px solid black;
        }
        /* PERALTA */
    </style>
</head>
<body>

    <div class="navbar">
        <a href="">Home</a>
        <a href="">Profile</a>
        <a href="">Setting</a>
    </div>

    <div class="main">

        <h2>Landing Page</h2>

        <div class="intro">
            <div class="intro-text">
                <p>
                    Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                    This is your intro text for the website.
                </p>
                <p><b>Example:</b> Hand Held Devices, Desktops, Mechanical Devices</p>
            </div>

            <div class="intro-box"></div>
        </div>

        <!-- Boxes -->
        <div class="row">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>

        <h3>E-waste devices</h3>

        <!-- Grid For e-waste devices-->
        <div class="grid">
            <div class="grid-box"></div>
            <div class="grid-box"></div>
            <div class="grid-box"></div>
            <div class="grid-box"></div>
            <div class="grid-box"></div>
            <div class="grid-box"></div>
        </div>

    </div>

</body>
</html>
